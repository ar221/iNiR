regular1=FF5A4E  # red
regular2=A8C97B  # green
regular3=FFB648  # yellow
regular4=6FC5C0  # blue
regular5=D28BD8  # magenta
regular6=8FE2DD  # cyan
regular7=F2E3C6  # white

